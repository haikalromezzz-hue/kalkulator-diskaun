<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kira Diskaun</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator-card">
    <h2>Kalkulator Diskaun</h2>

    <label>Harga Asal (RM)</label>
    <input type="text" id="price">

    <label>Diskaun (%)</label>
    <input type="text" id="discount">

    <button onclick="kira()">Kira</button>

    <button onclick="lihatHistory()">Sejarah</button>


    <div class="result">
        Jumlah Bayaran:
        <span id="result"></span>
    </div>

    <!-- Notification area -->
    <p id="notification" style="margin-top:15px; text-align:center; color:green; font-weight:bold;"></p>
</div>

<script>


function kira() {
    var price = document.getElementById("price").value;
    var discount = document.getElementById("discount").value;

    // BUG formula tetap ada
    var total = (price * discount) / 100;

    document.getElementById("result").innerHTML = total;

    // Notification salah
    document.getElementById("notification").innerHTML =
        "Pengiraan telah berjaya";

    // Simpan rekod dalam localStorage
    var record = {
        price: price,
        discount: discount,
        total: total
    };

    var history = JSON.parse(localStorage.getItem("history")) || [];
    history.push(record);
    localStorage.setItem("history", JSON.stringify(history));
}

// Button Sejarah
function lihatHistory() {
    window.location.href = "history.html";


}

</script>
</body>
</html>
